apiVersion: apps/v1
kind: Deployment
metadata:
  name: myserver
  namespace: default
  labels:
    app: myserver
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myserver
  template:
    metadata:
      labels:
        app: myserver
    spec:
      containers:
        - name: myserver
          image: dracoo23/myserver:latest
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: myserver-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
